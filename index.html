    <br>

       <tr>
        <th>Number</th>

        <td>01</td>
        <td>Summation</td>

       <tr>

    <br><br>

    <label>Enter number 01 :</label>

    <br><br>

    <label>Enter number 02 :</label>
    <input type="number" id="num2">
    <br><br>

    <label >Operator Number :</label>
    <input type="number" id="op">
    <br><br>
    

    
    <button id="btn" onclick="cal()">Answer</button>
    <br><br>

    <h2 id="total"></h2>
